name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Get Version from Gradle
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" android/app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Rename APK
        id: apk
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SLUG=$(echo "$COMMIT_MSG" | tr ' ' '-' | tr -cd '[:alnum:]-')
          VERSION=${{ steps.version.outputs.version }}
          APK_NAME="${VERSION}U-${SLUG}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
      - name: Delete Previous GitHub Release
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create New GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "v${{ steps.version.outputs.version }} — ${{ steps.apk.outputs.apk_name }}"
          files: ${{ steps.apk.outputs.apk_name }}
          make_latest: true