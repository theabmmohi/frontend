<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passkey Test v2</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script type="module">
    import { startRegistration, startAuthentication } from "https://esm.sh/@simplewebauthn/browser@13"

    const SERVER = "https://api.imabm.eu.cc"

    firebase.initializeApp({
      apiKey: "AIzaSyCapJv893V3v4jkFQg88PiLlE57gQzW7Ns",
      authDomain: "iamabm.firebaseapp.com",
      projectId: "iamabm",
      storageBucket: "iamabm.firebasestorage.app",
      messagingSenderId: "44857199556",
      appId: "1:44857199556:web:f74ab6bd038827dd94f291"
    })
    const auth = firebase.auth()

    // ── Logging ──────────────────────────────────────────────────────────────
    const log = (msg, type = "ok") => {
      const el   = document.getElementById("log")
      const line = document.createElement("div")
      line.className = type
      line.textContent = `${new Date().toLocaleTimeString()} › ${msg}`
      el.prepend(line)
    }
    const info  = (m) => log(m, "ok")
    const error = (m) => log(m, "err")
    const warn  = (m) => log(m, "warn")

    // ── Helpers ───────────────────────────────────────────────────────────────
    const getToken = async () => {
      if (!auth.currentUser) throw new Error("Not signed in!")
      return await auth.currentUser.getIdToken(true)
    }
    const updateUserInfo = () => {
      const user = auth.currentUser
      document.getElementById("user-info").textContent = user
        ? `${user.email} — UID: ${user.uid}`
        : "Not signed in"
    }
    auth.onAuthStateChanged(updateUserInfo)

    // ── Section 1: Firebase Sign In ───────────────────────────────────────────
    document.getElementById("btn-signin").onclick = async () => {
      const email = document.getElementById("email").value
      const pass  = document.getElementById("pass").value
      try {
        info("Signing in with email/password...")
        await auth.signInWithEmailAndPassword(email, pass)
        info(`✅ Signed in as ${auth.currentUser.email}`)
      } catch (e) { error(`Sign in: ${e.message}`) }
    }
    document.getElementById("btn-signout").onclick = async () => {
      await auth.signOut()
      warn("Signed out")
      renderPasskeys([])
    }

    // ── Section 2: Register Passkey ───────────────────────────────────────────
    document.getElementById("btn-register").onclick = async () => {
      try {
        info("── REGISTER ────────────────────")
        const token = await getToken()
        const name  = document.getElementById("passkey-name").value || "My Passkey"

        info("Fetching registration options...")
        const r1   = await fetch(`${SERVER}/passkey/options/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        })
        const d1 = await r1.json()
        if (!d1.success) return error(`Options: ${d1.message}`)
        info(`RP ID: ${d1.options?.rp?.id} | Excluding: ${d1.options?.excludeCredentials?.length || 0} credential(s)`)

        info("Prompting device...")
        const response = await startRegistration({ optionsJSON: d1.options })
        info(`Device ID: ${response.id.substring(0, 20)}...`)

        info("Verifying with server...")
        const r2 = await fetch(`${SERVER}/passkey/verify/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, response, name })
        })
        const d2 = await r2.json()
        if (d2.success) {
          info(`✅ ${d2.message}`)
          loadPasskeys()
        } else error(`Verify: ${d2.message}`)
      } catch (e) { error(`Exception: ${e.message}`) }
    }

    // ── Section 3: Sign In with Passkey (discoverable) ────────────────────────
    document.getElementById("btn-passkey-signin").onclick = async () => {
      try {
        info("── PASSKEY SIGN IN ─────────────")

        info("Fetching auth options...")
        const r1 = await fetch(`${SERVER}/passkey/options/auth`, {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        })
        const d1 = await r1.json()
        if (!d1.success) return error(`Options: ${d1.message}`)
        info(`Challenge: ${d1.options?.challenge?.substring(0, 20)}...`)

        info("Prompting device (discoverable)...")
        const response = await startAuthentication({ optionsJSON: d1.options })
        info(`Device ID: ${response.id.substring(0, 20)}...`)

        info("Verifying with server...")
        const r2 = await fetch(`${SERVER}/passkey/verify/auth`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ response })
        })
        const d2 = await r2.json()
        if (!d2.success) return error(`Verify: ${d2.message}`)

        info("Signing into Firebase with custom token...")
        await auth.signInWithCustomToken(d2.firebaseToken)
        info(`✅ Signed in as ${auth.currentUser.email}`)
        loadPasskeys()
      } catch (e) { error(`Exception: ${e.message}`) }
    }

    // ── Section 4: Manage Passkeys ────────────────────────────────────────────
    const loadPasskeys = async () => {
      try {
        if (!auth.currentUser) return
        const token = await getToken()
        const r = await fetch(`${SERVER}/passkey/list`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        })
        const d = await r.json()
        if (d.success) renderPasskeys(d.passkeys)
      } catch (e) { error(`List: ${e.message}`) }
    }

    const renderPasskeys = (passkeys) => {
      const el = document.getElementById("passkey-list")
      if (!passkeys.length) {
        el.innerHTML = "<div class='empty'>No passkeys registered</div>"
        return
      }
      el.innerHTML = passkeys.map(p => `
        <div class="passkey-item">
          <div>
            <div class="pk-name">${p.name}</div>
            <div class="pk-id">${p.id.substring(0, 24)}...</div>
            <div class="pk-date">${new Date(p.createdAt).toLocaleDateString()}</div>
          </div>
          <button class="btn-delete" data-id="${p.id}">Delete</button>
        </div>
      `).join("")

      el.querySelectorAll(".btn-delete").forEach(btn => {
        btn.onclick = async () => {
          try {
            const token = await getToken()
            const r = await fetch(`${SERVER}/passkey/delete`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token, credentialID: btn.dataset.id })
            })
            const d = await r.json()
            if (d.success) { info(`✅ ${d.message}`); loadPasskeys() }
            else error(`Delete: ${d.message}`)
          } catch (e) { error(`Exception: ${e.message}`) }
        }
      })
    }

    document.getElementById("btn-load-passkeys").onclick = loadPasskeys
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: monospace; background: #0a0a0a; color: #e0e0e0; padding: 16px; max-width: 600px; margin: 0 auto; }
    h2 { color: #fff; margin-bottom: 12px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
    .card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    input { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 7px 10px; border-radius: 6px; margin-bottom: 8px; font-family: monospace; font-size: 0.85rem; }
    button { padding: 7px 14px; border-radius: 6px; border: none; font-family: monospace; cursor: pointer; margin-right: 6px; margin-bottom: 4px; font-size: 0.8rem; }
    #btn-signin         { background: #2563eb; color: #fff; }
    #btn-signout        { background: #333; color: #aaa; }
    #btn-register       { background: #16a34a; color: #fff; }
    #btn-passkey-signin { background: #9333ea; color: #fff; width: 100%; padding: 12px; font-size: 0.9rem; margin-bottom: 0; }
    #btn-load-passkeys  { background: #222; color: #888; font-size: 0.75rem; }
    #btn-clear          { background: #1a1a1a; color: #555; font-size: 0.7rem; padding: 3px 8px; }
    #user-info { font-size: 0.75rem; color: #555; margin-top: 8px; }
    .passkey-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
    .pk-name { color: #e0e0e0; font-size: 0.85rem; }
    .pk-id   { color: #444; font-size: 0.7rem; margin-top: 2px; }
    .pk-date { color: #444; font-size: 0.7rem; }
    .btn-delete { background: #2a1014; color: #f87171; border: 1px solid #3a1a1a; font-size: 0.75rem; padding: 4px 10px; }
    .empty { color: #444; font-size: 0.8rem; text-align: center; padding: 12px; }
    #log { max-height: 350px; overflow-y: auto; }
    #log div { padding: 3px 7px; border-radius: 4px; margin-bottom: 3px; font-size: 0.75rem; word-break: break-all; }
    .ok   { background: #14291a; color: #4ade80; }
    .err  { background: #2a1014; color: #f87171; }
    .warn { background: #2a2010; color: #facc15; }
    .divider { border: none; border-top: 1px solid #222; margin: 12px 0; }
  </style>
</head>
<body>

  <div class="card">
    <h2>🔐 Firebase Sign In</h2>
    <input id="email" type="email" placeholder="Email"/>
    <input id="pass" type="password" placeholder="Password"/>
    <button id="btn-signin">Sign In</button>
    <button id="btn-signout">Sign Out</button>
    <div id="user-info">Not signed in</div>
  </div>

  <div class="card">
    <h2>🗝 Sign In With Passkey</h2>
    <button id="btn-passkey-signin">Sign in with Passkey</button>
  </div>

  <div class="card">
    <h2>➕ Register New Passkey</h2>
    <input id="passkey-name" placeholder="Passkey name (e.g. iPhone, Laptop)"/>
    <button id="btn-register">Register Passkey</button>
  </div>

  <div class="card">
    <h2>📋 My Passkeys <button id="btn-load-passkeys">Refresh</button></h2>
    <div id="passkey-list"><div class="empty">Sign in to see passkeys</div></div>
  </div>

  <div class="card">
    <h2>📜 Log <button id="btn-clear" onclick="document.getElementById('log').innerHTML=''">Clear</button></h2>
    <div id="log"></div>
  </div>

</body>
</html>
